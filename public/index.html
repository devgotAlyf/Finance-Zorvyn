  <link rel="stylesheet" href="css/pages.css">

  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML = '<div style="color:red; font-size:20px; padding: 20px; z-index:99999; position:relative; background:white;"><b>GLOBAL ERROR:</b> ' + e.message + ' <br> ' + e.filename + ':' + e.lineno + '</div>';
    });
  </script>

<body>
  <div id="app">
    <!-- Loading state -->
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#F5F5F0;">
      <div style="text-align:center;">
        <div
          style="width:40px; height:40px; background:#4F46E5; border-radius:8px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"

            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />

        <div style="color:#64748B; font-family:Inter,sans-serif; font-size:0.8125rem;">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Chart.js -->
